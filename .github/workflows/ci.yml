name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # Testcontainers uses the runner's docker daemon out of the box
      - name: Build and test
        run: ./gradlew build --console=plain

      - name: Publish test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test

  docker:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Serialize GHCR pushes: two quick main merges otherwise race on the
    # :latest blobs ("unknown blob"). Queue, never cancel a publish mid-push.
    concurrency:
      group: ghcr-publish
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ghcr.io/antonovyuriy/potok:latest \
                       -t ghcr.io/antonovyuriy/potok:${{ github.sha }} .

      - name: Push image
        run: |
          docker push ghcr.io/antonovyuriy/potok:latest
          docker push ghcr.io/antonovyuriy/potok:${{ github.sha }}
