services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/potok
      DB_USER: potok
      DB_PASSWORD: potok
      # Optional: telegram action fails its step with a clear error when unset
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      # Tuning knobs (see README "Configuration")
      POTOK_API_KEY: ${POTOK_API_KEY:-}
      POTOK_RETENTION_DAYS: ${POTOK_RETENTION_DAYS:-30}
      POTOK_SHUTDOWN_GRACE: ${POTOK_SHUTDOWN_GRACE:-PT20S}
      POTOK_QUEUE_LOCK_TIMEOUT: ${POTOK_QUEUE_LOCK_TIMEOUT:-PT60S}
      POTOK_LOG_JSON: ${POTOK_LOG_JSON:-false}
      POTOK_DLQ_TELEGRAM: ${POTOK_DLQ_TELEGRAM:-false}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /actuator/health HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q UP <&3"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: potok
      POSTGRES_USER: potok
      POSTGRES_PASSWORD: potok
    volumes:
      - potok-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U potok -d potok"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  potok-pgdata:
