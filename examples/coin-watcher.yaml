# Watch a product price every 5 minutes; ping Telegram when it drops below 100.
# extract pulls ONE value out of the response, so noisy fields (timestamps,
# stock counters) don't cause false fires. For HTML pages use a css selector:
#   extract: { css: "span.price" }
# For "fire on any change of the extracted value" use fire_when: "changed".
name: coin-watcher
trigger:
  poll:
    interval: 5m
    http:
      method: GET
      url: "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd"
    extract:
      jsonpath: "$.bitcoin.usd"
    fire_when: "{{ poll.value < 100000 }}"
steps:
  - name: notify
    action: telegram
    with:
      chat_id: "${TELEGRAM_CHAT_ID}"
      text: "💰 Цена пробила порог: {{ trigger.value }}"
