# Watch ONE number in any JSON API and get an EMAIL when it crosses your line.
# Edge-triggered — one email when the condition becomes true, silence while it stays true.
name: email-alert
trigger:
  poll:
    interval: 1h
    http:
      method: GET
      url: "https://api.nbp.pl/api/exchangerates/rates/a/eur/?format=json"
    extract:
      jsonpath: "$.rates[0].mid"
    fire_when: "{{ poll.value > 4.30 }}"
steps:
  - name: notify
    action: email
    with:
      to: "you@example.com"
      subject: "📈 Threshold crossed"
      body: "The value is now {{ trigger.value }} (> 4.30) — https://api.nbp.pl/api/exchangerates/rates/a/eur/?format=json"
