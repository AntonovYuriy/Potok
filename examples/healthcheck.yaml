# Every 5 minutes: probe a service; alert in Telegram only when it is NOT healthy.
# fail_on_status: false records ANY http response as step output instead of
# failing the step, so the alert condition can react to the status code.
name: healthcheck
trigger:
  cron: "*/5 * * * *"
steps:
  - name: probe
    action: http
    with:
      method: GET
      url: "https://httpbin.org/status/200"
      fail_on_status: false

  - name: alert
    if: "{{ steps.probe.status != 200 }}"
    action: telegram
    with:
      chat_id: "${TELEGRAM_CHAT_ID}"
      text: "ALERT: healthcheck returned {{ steps.probe.status }}"
