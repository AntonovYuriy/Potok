logging:
  # logback-json-true.xml = structured JSON (logstash encoder), -false = plain text
  config: classpath:logback-json-${POTOK_LOG_JSON:false}.xml

spring:
  application:
    name: potok
  lifecycle:
    timeout-per-shutdown-phase: ${POTOK_SHUTDOWN_GRACE:PT20S}
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/potok}
    username: ${DB_USER:potok}
    password: ${DB_PASSWORD:potok}
  flyway:
    enabled: true
  mvc:
    problemdetails:
      enabled: true

server:
  port: ${PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db

potok:
  api-key: ${POTOK_API_KEY:}
  public-url: ${POTOK_PUBLIC_URL:http://localhost:8080}
  queue:
    workers: ${POTOK_QUEUE_WORKERS:2}
    poll-interval: ${POTOK_QUEUE_POLL_INTERVAL:PT1S}
    lock-timeout: ${POTOK_QUEUE_LOCK_TIMEOUT:PT60S}
    retry-base-delay: ${POTOK_QUEUE_RETRY_BASE_DELAY:PT10S}
    retry-max-delay: ${POTOK_QUEUE_RETRY_MAX_DELAY:PT10M}
    default-max-attempts: ${POTOK_QUEUE_DEFAULT_MAX_ATTEMPTS:3}
    shutdown-grace: ${POTOK_SHUTDOWN_GRACE:PT20S}
  cron:
    refresh-interval: ${POTOK_CRON_REFRESH_INTERVAL:PT30S}
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    poll-updates: ${POTOK_TELEGRAM_POLL_UPDATES:true}
    api-base: ${POTOK_TELEGRAM_API_BASE:https://api.telegram.org}
    default-chat-id: ${TELEGRAM_CHAT_ID:}
  smtp:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    from: ${SMTP_FROM:}
    starttls: ${SMTP_STARTTLS:true}
    auth: ${SMTP_AUTH:true}
  dlq:
    telegram-notify: ${POTOK_DLQ_TELEGRAM:false}
    notify-interval: ${POTOK_DLQ_NOTIFY_INTERVAL:PT1M}
  retention:
    days: ${POTOK_RETENTION_DAYS:30}
