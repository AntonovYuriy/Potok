# Integration tests stub external services with WireMock on localhost — the
# SSRF guard must not block them. Guard behavior itself is covered by
# UrlGuardTest and PreviewSsrfIntegrationTest (which overrides this to false).
potok.allow-private-urls=true
# Many cached Spring contexts share one Postgres container (max_connections=100);
# keep each context's pool tiny so the whole suite fits.
spring.datasource.hikari.maximum-pool-size=3
